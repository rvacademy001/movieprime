<script>
// Parse Query parameters
const params = new URLSearchParams(location.search);
const targetLink = params.get('link') ? decodeURIComponent(params.get('link')) : '';
const movieTitle = params.get('title') ? decodeURIComponent(params.get('title')) : 'Movie Link';

document.getElementById('movieTitle').textContent = movieTitle;

// Countdown logic
let count = 6;
const countEl = document.getElementById('countdown');
const statusEl = document.getElementById('statusMsg');
const dlBtn = document.getElementById('dlBtn');

const timer = setInterval(() => {
  count--;
  countEl.textContent = count;
  
  if (count <= 0) {
    clearInterval(timer);
    document.querySelector('.timer-wrap').style.display = 'none';
    
    // Change messages and show download button
    const lang = localStorage.getItem('mp_lang') || 'en';
    statusEl.innerHTML = lang === 'si' 
      ? 'ඔබගේ සබැඳිය සූදානම්! පහත බොත්තම ක්ලික් කරන්න.' 
      : 'Your link is ready! Click the button below to download.';
      
    dlBtn.style.display = 'block';
  }
}, 1000);

// Redirection handler on button click
dlBtn.addEventListener('click', () => {
  if (targetLink) {
    window.location.href = targetLink;
  } else {
    alert('Target link missing.');
  }
});

// Lang support
function applyLang(lang){
  document.querySelectorAll('[data-en]').forEach(el=>{
    el.textContent = lang === 'si' ? (el.dataset.si || el.dataset.en) : el.dataset.en;
  });
  document.querySelectorAll('.lang-toggle button').forEach(b=>{
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  localStorage.setItem('mp_lang', lang);
  
  // Dynamic update of status message depending on state
  if (count <= 0) {
    statusEl.innerHTML = lang === 'si' 
      ? 'ඔබගේ සබැඳිය සූදානම්! පහත බොත්තම ක්ලික් කරන්න.' 
      : 'Your link is ready! Click the button below to download.';
  }
}
const saved = localStorage.getItem('mp_lang') || 'en';
applyLang(saved);
document.querySelectorAll('.lang-toggle button').forEach(b=>{
  b.addEventListener('click', ()=> applyLang(b.dataset.lang));
});
</script>
