<!DOCTYPE html>
<html lang="en">
<head>

<title>Movie Prime — Categories</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">Movie<span>Prime</span></a>
    
    <nav class="main-nav">
      <a href="index.html" data-en="Home" data-si="මුල් පිටුව">Home</a>
      <a href="category.html" class="active" data-en="Categories" data-si="කාණ්ඩ">Categories</a>
      <a href="member.html" data-en="Member" data-si="සාමාජික">Member</a>
    </nav>

    <!-- Unified Search Bar -->
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>

    </div>

    <div class="lang-toggle">
      <button data-lang="en" class="active">EN</button>
      <button data-lang="si">සිං</button>
    </div>
  </div>
</header>
<div class="sprocket-rule"></div>

<section class="section" style="padding-top:40px">
  <div class="section-head">
    <h2 data-en="Browse by Category" data-si="කාණ්ඩ අනුව සොයන්න">Browse by Category</h2>
  </div>
  <div class="chips" id="categoryChips"></div>
  <div class="grid" id="categoryGrid">
    <p style="color:var(--muted)">Loading…</p>
  </div>
</section>

<footer>
  <div class="footer-inner">
    <span>© 2026 Movie Prime</span>
    <span data-en="Built for movie lovers." data-si="චිත්‍රපට ලෝලීන් සඳහා.">Built for movie lovers.</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/app.js"></script>
